name: Padel Saturday Sniper

# WHY THE SCHEDULE LOOKS LIKE THIS ------------------------------------------
# GitHub cron can't run more often than every 5 min and is often delayed further,
# so we DON'T rely on cron frequency. Instead cron just STARTS the job a bit before
# games are expected to open; snipe.mjs then polls every few seconds from inside the
# job for up to MAX_RUNTIME_MS. Adjust the cron to your real open time after you've
# watched the group once.
#
# Observed pattern: next-weekend games seemed to appear Sunday ~12:30 Europe/Lisbon.
# Lisbon is UTC+1 (summer) / UTC+0 (winter). The times below assume summer (WEST, UTC+1),
# so 12:20 Lisbon = 11:20 UTC. We fire a few staggered starts to survive cron delay.

on:
  schedule:
    # Sunday, staggered around the expected open time (UTC). Edit to taste.
    - cron: '15 11 * * 0'   # 12:15 Lisbon (summer)
    - cron: '25 11 * * 0'   # backup start in case the first was delayed/missed
  workflow_dispatch: {}      # manual "Run workflow" button for testing

concurrency:
  group: padel-sniper
  cancel-in-progress: false

jobs:
  snipe:
    runs-on: ubuntu-latest
    timeout-minutes: 55        # must exceed MAX_RUNTIME_MS below
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps + Chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run sniper
        env:
          STORAGE_STATE_B64:  ${{ secrets.STORAGE_STATE_B64 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROUP_URL:          'https://racket.id/groups/4Y4qCwClTWQPAM'
          POLL_INTERVAL_MS:   '6000'
          MAX_RUNTIME_MS:     '2700000'   # 45 minutes of polling
          HEADLESS:           'true'
        run: node snipe.mjs

      - name: Upload screenshots (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sniper-screenshots
          path: |
            joined.png
            no-join-button.png
          if-no-files-found: ignore
          retention-days: 7
